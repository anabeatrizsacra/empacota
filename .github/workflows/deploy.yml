name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "Validating static files..."
          test -f index.html && echo "index.html OK" || (echo "index.html MISSING" && exit 1)
          test -f css/style.css && echo "css/style.css OK" || (echo "css/style.css MISSING" && exit 1)
          test -f js/calculator.js && echo "js/calculator.js OK" || (echo "js/calculator.js MISSING" && exit 1)
          echo "All static files validated successfully."

      - name: Check for sensitive data patterns
        run: |
          echo "Scanning for potential sensitive data..."
          PATTERNS="L'ORÉAL|LOREAL|loreal|l'oreal|senha|password|api_key|secret"
          if grep -rEi "$PATTERNS" index.html css/ js/ 2>/dev/null; then
            echo "WARNING: Potential sensitive data found!"
            exit 1
          else
            echo "No sensitive data patterns detected."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          echo "Building static site artifact..."
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/
          cp -r js _site/
          echo "Build complete."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
